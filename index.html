<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doggo Generator</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        .loader {
            border-top-color: #3498db;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-5">

    <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8 text-center">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">🐾 Doggo Finder</h1>
        <p class="text-gray-600 mb-6">Need a smile? Click the button below!</p>

        <div id="image-container" class="relative w-full h-64 bg-gray-200 rounded-lg overflow-hidden mb-6 flex items-center justify-center">
            <img id="dog-img" src="" alt="Dog image" class="hidden w-full h-full object-cover">
            <div id="loading-spinner" class="loader ease-linear rounded-full border-4 border-t-4 border-gray-300 h-12 w-12"></div>
            <p id="placeholder-text" class="text-gray-400">Click to fetch!</p>
        </div>

        <button id="fetch-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition duration-300 ease-in-out transform active:scale-95">
            Get New Dog 🐶
        </button>
    </div>

    <script>
        const dogImg = document.getElementById('dog-img');
        const fetchBtn = document.getElementById('fetch-btn');
        const spinner = document.getElementById('loading-spinner');
        const placeholder = document.getElementById('placeholder-text');

        async function fetchDog() {
            // UI State: Loading
            spinner.classList.remove('hidden');
            dogImg.classList.add('hidden');
            placeholder.classList.add('hidden');
            fetchBtn.disabled = true;
            fetchBtn.innerText = "Fetching...";

            try {
                const response = await fetch('https://dog.ceo');
                const data = await response.json();
                
                dogImg.src = data.message;
                
                // Ensure image is loaded before showing
                dogImg.onload = () => {
                    spinner.classList.add('hidden');
                    dogImg.classList.remove('hidden');
                    fetchBtn.disabled = false;
                    fetchBtn.innerText = "Get New Dog 🐶";
                };
            } catch (error) {
                alert("Oops! Something went wrong.");
                fetchBtn.disabled = false;
                fetchBtn.innerText = "Try Again";
            }
        }

        fetchBtn.addEventListener('click', fetchDog);
    </script>
</body>
</html>
